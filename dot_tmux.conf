unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Forward OSC52 clipboard escapes to the outer terminal
set -g set-clipboard on
set -as terminal-features ',*:clipboard'

set -g mouse on

bind v split-window -h
bind s split-window -v
bind x kill-pane

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# tmux-powerline status line
set -g status on
set -g status-interval 2
set -g status-justify "centre"
set -g status-left-length 200
set -g status-right-length 150
set -g status-left  "#(~/.tmux/plugins/tmux-powerline/powerline.sh left)"
set -g status-right "#(~/.tmux/plugins/tmux-powerline/powerline.sh right)"

# Transparent status-bar background (no green block in the middle)
set -g status-style "bg=default,fg=default"
set -g message-style "bg=default,fg=default"

# Hide the window list (using wezterm tabs instead)
set -g window-status-format ""
set -g window-status-current-format ""
set -g window-status-separator ""

